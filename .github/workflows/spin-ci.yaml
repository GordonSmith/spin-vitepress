name: "Spin-CI"

on:
  push:
    branches:
      - "main"

env:
  NODE_VERSION: "24"
  RUST_TARGET: "wasm32-wasip2"
  SPIN_VERSION: ""

jobs:

  spin:
    runs-on: "ubuntu-latest"
    name: Build Spin App
    steps:

      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            test-ts/package-lock.json

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            test-rust -> target

      - name: Install rust dependencies
        run: |
          rustup target add ${{ env.RUST_TARGET }}
          command -v wit-bindgen >/dev/null 2>&1 || cargo install wit-bindgen-cli

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/downloads
            vcpkg/packages
            vcpkg/buildtrees
            vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg_overlays/**', 'test-c/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg dependencies
        run: |
          ./vcpkg/bootstrap-vcpkg.sh
          ./vcpkg/vcpkg install

      - name: Install Spin
        uses: fermyon/actions/spin/setup@v1
        with:
          plugins: |
            js2wasm

      - name: Install root Node dependencies
        run: |
          npm ci

      - name: Install test-ts Node dependencies
        working-directory: test-ts
        run: |
          npm ci

      - name: Build vitepress
        run: |
          spin build

      - name: Install spin cloud plugin
        run: |
          spin plugin install cloud --yes

      - name: Deploy to Fermyon Cloud
        run: |
          spin cloud login --token ${{ secrets.FERMYON_CLOUD }}
          spin cloud deploy -f spin.toml

      - name: Install spin aka plugin
        run: |
          spin plugin install aka --yes

      - name: Deploy to Fermyon Wasm Functions
        run: |
          spin aka login --token ${{ secrets.SPIN_AKA_ACCESS_TOKEN }}
          spin aka deploy --no-confirm
